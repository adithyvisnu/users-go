version: "3.9"

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ENV: development
      DATABASE_URL: "host=postgres user=postgres password=postgres dbname=usersdb port=5432 sslmode=disable"
      REDIS_ADDR: "redis:6379"
      JWT_SECRET: "dev-secret-change-in-production"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: usersdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: docker.io/redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
